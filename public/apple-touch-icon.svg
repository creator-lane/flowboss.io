<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="FlowBoss">
  <!-- iOS home-screen icon. Tighter bleed than the favicon since iOS rounds
       the corners itself and clips anything outside the safe zone. -->
  <defs>
    <linearGradient id="fb-bg-lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="fb-shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Full-bleed — iOS applies its own mask. -->
  <rect width="180" height="180" fill="url(#fb-bg-lg)"/>

  <!-- Wrench glyph, centered and scaled 2.8× the favicon version. -->
  <g transform="translate(90 90) rotate(-30) scale(2.8)" filter="url(#fb-shadow-lg)">
    <rect x="-3" y="-2" width="24" height="6" rx="2" fill="#ffffff"/>
    <path d="M -3 -6 L -15 -6 A 7 7 0 0 0 -15 8 L -3 8 L -3 2 L -9 2 A 3 3 0 0 1 -9 -0 L -3 -0 Z"
          fill="#ffffff"/>
  </g>

  <!-- Amber hi-vis corner — larger here since the icon is bigger. -->
  <g>
    <path d="M 110 180 L 180 110 L 180 150 L 150 180 Z" fill="#f59e0b"/>
    <path d="M 110 180 L 122 180 L 180 122 L 180 110 Z" fill="#fde68a" fill-opacity="0.6"/>
  </g>
</svg>
