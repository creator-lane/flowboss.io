<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowBoss — Run Your Trade, Not Your Paperwork</title>
  <meta name="description" content="FlowBoss — the field service app built for plumbers, HVAC techs, and electricians.">

  <!--
    /go is a paid-traffic landing slot. It used to host its own card with
    a (broken) AppsFlyer OneLink that only made sense for mobile installs.
    Now that the web product is live, single-funnel-to-homepage is the
    higher-converting move:
      - Desktop visitors get the homepage with the trial CTA they can
        actually convert through.
      - Mobile visitors get the homepage AND the AppsFlyer Smart Banner
        SDK loaded in the root index.html, which auto-prompts the
        Play/App Store install — so the mobile-install flow still works
        without the broken OneLink in the middle.
      - All UTM / fbclid / gclid params survive so Google Ads + GA4
        attribution stay clean.
    Implemented as both a meta refresh (works without JS) and a JS
    redirect (instant). Fallback link visible if both fail.
  -->

  <!-- Google Ads (gtag.js) — preserved so the click ping still fires
       even though the page itself is just a redirect. -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17189957809"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-17189957809');
  </script>

  <script>
    // Build the destination: flowboss.io homepage + every search param
    // we received. utm_source defaults to 'go' if the campaign didn't
    // tag one explicitly, so we can still tell paid /go traffic apart
    // from organic homepage traffic in GA.
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        if (!params.has('utm_source')) params.set('utm_source', 'go');
        var qs = params.toString();
        var dest = 'https://flowboss.io/' + (qs ? '?' + qs : '');
        // Replace so back-button doesn't trap the user on /go.
        window.location.replace(dest);
      } catch (e) {
        window.location.replace('https://flowboss.io/?utm_source=go');
      }
    })();
  </script>

  <!-- No-JS / pre-script fallback: 0-second meta refresh. -->
  <meta http-equiv="refresh" content="0; url=https://flowboss.io/?utm_source=go">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 360px; padding: 32px 24px; background: white; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Visible only if both the JS redirect and the meta refresh fail. -->
  <div class="card">
    <div class="spinner"></div>
    <h1>Loading FlowBoss…</h1>
    <p>If this page doesn't redirect automatically, <a href="https://flowboss.io/?utm_source=go">tap here to continue</a>.</p>
  </div>
</body>
</html>
